name: Daily startup news briefing

on:
  schedule:
    - cron: "15 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-startup-news
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: pnpm 설정
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
          run_install: false

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: 의존성 설치
        run: pnpm install --frozen-lockfile

      - name: 실행 환경 디버그 정보
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "utc_now=$(date -u '+%Y-%m-%d %H:%M:%S %Z')"
          echo "kst_now=$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S %Z')"
          echo "branch=${GITHUB_REF_NAME}"

      - name: 최근 48시간 뉴스 수집
        env:
          USE_OPENAI_SUMMARY: ${{ vars.USE_OPENAI_SUMMARY || 'false' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_SUMMARY_MODEL: ${{ vars.OPENAI_SUMMARY_MODEL || 'gpt-5.4-mini' }}
          OPENAI_REQUEST_DELAY_MS: ${{ vars.OPENAI_REQUEST_DELAY_MS || '7000' }}
          OPENAI_MAX_RETRIES: ${{ vars.OPENAI_MAX_RETRIES || '2' }}
          OPENAI_DAILY_CALL_BUDGET: ${{ vars.OPENAI_DAILY_CALL_BUDGET || '12' }}
          OPENAI_ARTICLE_TEXT_MAX_CHARS: ${{ vars.OPENAI_ARTICLE_TEXT_MAX_CHARS || '3500' }}
          OPENAI_BODY_MAX_ITEMS: ${{ vars.OPENAI_BODY_MAX_ITEMS || '8' }}
          OPENAI_DESCRIPTION_MAX_ITEMS: ${{ vars.OPENAI_DESCRIPTION_MAX_ITEMS || '6' }}
          USE_FULL_TEXT_EXTRACTION: ${{ vars.USE_FULL_TEXT_EXTRACTION || 'true' }}
          ARTICLE_FETCH_TIMEOUT_MS: ${{ vars.ARTICLE_FETCH_TIMEOUT_MS || '8000' }}
          MAX_ARTICLE_FETCH_CONCURRENCY: ${{ vars.MAX_ARTICLE_FETCH_CONCURRENCY || '3' }}
          MIN_ARTICLE_TEXT_LENGTH: ${{ vars.MIN_ARTICLE_TEXT_LENGTH || '300' }}
          MAX_TITLE_FALLBACK_ITEMS: ${{ vars.MAX_TITLE_FALLBACK_ITEMS || '0' }}
          FORCE_SAVE_EMPTY: ${{ vars.FORCE_SAVE_EMPTY || 'false' }}
          MAX_ITEMS_PER_CATEGORY: ${{ vars.MAX_ITEMS_PER_CATEGORY || '5' }}
          ALLOW_UNLISTED_SOURCES: ${{ vars.ALLOW_UNLISTED_SOURCES || 'false' }}
          ENABLE_DISCOVERY_FALLBACK: ${{ vars.ENABLE_DISCOVERY_FALLBACK || 'false' }}
          DISCOVERY_MAX_RESULTS_PER_QUERY: ${{ vars.DISCOVERY_MAX_RESULTS_PER_QUERY || '5' }}
          DISCOVERY_MAX_TOTAL_RESULTS: ${{ vars.DISCOVERY_MAX_TOTAL_RESULTS || '40' }}
          DISCOVERY_REQUIRE_ORIGINAL_URL: ${{ vars.DISCOVERY_REQUIRE_ORIGINAL_URL || 'true' }}
        run: pnpm run collect

      - name: 변경된 뉴스 데이터 커밋
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/news.json data/archive
          if [ -f data/summary-cache.json ]; then
            git add data/summary-cache.json
          fi

          if git diff --cached --quiet; then
            echo "변경된 뉴스 데이터가 없습니다."
          else
            git commit -m "chore: update daily news briefing" || echo "::warning::자동 커밋에 실패했습니다."
            git push || echo "::warning::자동 푸시에 실패했습니다. 저장소 권한을 확인하세요."
          fi
