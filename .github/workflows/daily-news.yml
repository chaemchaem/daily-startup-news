name: Daily startup news briefing

on:
  schedule:
    # GitHub Actions cron은 UTC 기준입니다. 00:00 UTC = 09:00 KST.
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-startup-news
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 의존성 설치
        run: npm install --no-audit --no-fund

      - name: 직전 24시간 뉴스 수집
        env:
          USE_OPENAI_SUMMARY: ${{ vars.USE_OPENAI_SUMMARY || 'false' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.4-nano' }}
          MAX_ITEMS_PER_CATEGORY: ${{ vars.MAX_ITEMS_PER_CATEGORY || '5' }}
          ALLOW_UNLISTED_SOURCES: ${{ vars.ALLOW_UNLISTED_SOURCES || 'false' }}
        run: npm run collect

      - name: 변경된 뉴스 데이터 커밋
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/news.json data/archive

          if git diff --cached --quiet; then
            echo "변경된 뉴스 데이터가 없습니다."
          else
            git commit -m "chore: update daily news briefing" || echo "::warning::자동 커밋에 실패했습니다."
            git push || echo "::warning::자동 푸시에 실패했습니다. 저장소 권한을 확인하세요."
          fi
